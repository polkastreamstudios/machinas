<!DOCTYPE html>
<html>
<head>
    <title>$Machinas</title>
    <meta charset="UTF-8">
    <script src="telegram-web-app.js"></script>
    <style>
        html, body, #canvas {
            margin: 0;
            padding: 0;
            border: 0;
        }

        body {
            color: white;
            background-color: black;
            overflow: hidden;
            touch-action: none;
        }

        #canvas {
            display: block;
        }

        #canvas:focus {
            outline: none;
        }

        #status, #status-splash, #status-progress {
            position: absolute;
            left: 0;
            right: 0;
        }

        #status, #status-splash {
            top: 0;
            bottom: 0;
        }

        #status {
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: hidden;
        }

        #status-splash {
            max-height: 100%;
            max-width: 100%;
            margin: auto;
        }

        #status-splash.show-image--false {
            display: none;
        }

        #status-splash.fullsize--true {
            height: 100%;
            width: 100%;
            object-fit: contain;
        }

        #status-splash.use-filter--false {
            image-rendering: pixelated;
        }

        #status-progress {
            display: none;
            position: absolute;
            bottom: 0; /* Anchored to bottom edge */
            left: 0;
            right: 0;
            width: 100%; /* Full width */
            height: 4px;
            appearance: none;
            -webkit-appearance: none;
        }

        /* Light blue gradient for the progress bar */
        #status-progress::-webkit-progress-bar {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        #status-progress::-webkit-progress-value {
            background: linear-gradient(90deg, #4da6ff, #66b3ff, #80c0ff);
            border-radius: 4px;
        }

        #status-progress::-moz-progress-bar {
            background: linear-gradient(90deg, #4da6ff, #66b3ff, #80c0ff);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <canvas id="canvas">
        Your browser does not support the canvas tag.
    </canvas>

    <div id="status">
        <img id="status-splash" class="show-image--true fullsize--false use-filter--true" src="index.png" alt="">
        <progress id="status-progress"></progress>
    </div>

    <script src="index.js"></script>
    <script>
        const statusOverlay = document.getElementById('status');
        const statusProgress = document.getElementById('status-progress');
        const canvas = document.getElementById('canvas');

        const engine = new Engine({"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":36493024,"index.wasm":36145869},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4});

        statusOverlay.style.visibility = 'visible';
        statusProgress.style.display = 'block';

        engine.startGame({
            onProgress: function(current, total) {
                if (current > 0 && total > 0) {
                    statusProgress.value = current;
                    statusProgress.max = total;
                } else {
                    statusProgress.removeAttribute('value');
                    statusProgress.removeAttribute('max');
                }
            }
        }).then(() => {
            statusOverlay.remove();
        });
    </script>
</body>
</html>
